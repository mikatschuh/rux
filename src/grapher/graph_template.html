<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/webcola/WebCola/cola.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/cytoscape-cola/cytoscape-cola.js"></script>
        <style>
            body {
                margin: 0;
            }
            #cy {
                width: 100vw;
                height: 100vh;
                background: #1a1a2e;
            }
        </style>
    </head>
    <body>
        <div id="cy"></div>
        <script>
            cytoscape.use(cytoscapeCola);
            const cy = cytoscape({
                userZoomingEnabled: true,
                userPanningEnabled: true,
                container: document.getElementById("cy"),
                elements: [__ELEMENTS__],
                layout: {
                    name: "cola",
                    animate: true,
                    infinite: true,
                    nodeSpacing: 40,
                    edgeLength: 100,
                    pull: 0.001,
                    handleDisconnected: true,
                    convergenceThreshold: 0.01,
                    fit: false,
                },
                style: [
                    {
                        selector: "node",
                        style: {
                            label: "data(label)",
                            color: "#fff",
                            "font-size": "12px",
                            "text-valign": "center",
                            "text-halign": "center",
                            width: "label",
                            height: "label",
                            padding: "10px",
                            shape: "roundrectangle",
                            "background-color": "#6c63ff",
                        },
                    },
                    {
                        selector: 'node[group="binary"]',
                        style: { "background-color": "#e17055" },
                    },
                    {
                        selector: 'node[group="literal"]',
                        style: { "background-color": "#00b894" },
                    },
                    {
                        selector: 'node[group="variable"]',
                        style: { "background-color": "#6c63ff" },
                    },
                    {
                        selector: "edge",
                        style: {
                            width: 2,
                            "line-color": "#a29bfe",
                            "target-arrow-color": "#a29bfe",
                            "target-arrow-shape": "triangle",
                            "curve-style": "bezier",
                            label: "data(label)",
                            color: "#ccc",
                            "font-size": "10px",
                            "text-background-color": "#1a1a2e",
                            "text-background-opacity": 1,
                            "text-background-padding": "3px",
                        },
                    },
                ],
            });
            cy.one("layoutstop", () => {
                cy.fit(undefined, 50);
                cy.zoom(Math.min(cy.zoom(), 2));
            });

            cy.on("grab", "node", () =>
                cy.layout({ name: "cola", animate: false }).stop(),
            );
            cy.on("free", "node", () =>
                cy
                    .layout({
                        name: "cola",
                        animate: true,
                        infinite: true,
                        nodeSpacing: 40,
                        edgeLength: 100,
                        pull: 0.001,
                        handleDisconnected: true,
                        convergenceThreshold: 0.01,
                        fit: false,
                        refresh: 2,
                        maxSimulationTime: 4000,
                    })
                    .run(),
            );
        </script>
    </body>
</html>
