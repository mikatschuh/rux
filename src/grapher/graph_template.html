<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/webcola/WebCola/cola.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/cytoscape-cola/cytoscape-cola.js"></script>
        <style>
            body {
                margin: 0;
            }
            #cy {
                width: 100vw;
                height: 100vh;
                background: #1a1a2e;
            }
        </style>
    </head>
    <body>
        <div id="cy"></div>
        <script>
            cytoscape.use(cytoscapeCola);

            const createLayout = () => ({
                name: "cola",
                animate: true,
                infinite: true,
                fit: false,
                nodeSpacing: 32,
                edgeLength: 50,
                edgeElasticity: 0.04,
                nestingFactor: 0.1,
                gravity: 0.0,
                avoidOverlap: true,
                handleDisconnected: true,
                nodeDimensionsIncludeLabels: true,
                convergenceThreshold: 0.01,
                refresh: 3,
            });

            const cy = cytoscape({
                userZoomingEnabled: true,
                userPanningEnabled: true,
                wheelSensitivity: 0.2,
                container: document.getElementById("cy"),
                elements: [__ELEMENTS__],
                style: [
                    {
                        selector: "node",
                        style: {
                            label: "data(label)",
                            color: "#fff",
                            "font-family": '"JetBrains Mono", monospace',
                            "font-size": "12px",
                            "text-valign": "center",
                            "text-halign": "center",
                            width: "label",
                            height: "label",
                            padding: "10px",
                            shape: "roundrectangle",
                            "background-color": "#6c63ff",
                        },
                    },
                    {
                        selector: 'node[group="binary"]',
                        style: { "background-color": "#e17055" },
                    },
                    {
                        selector: 'node[group="literal"]',
                        style: { "background-color": "#00b894" },
                    },
                    {
                        selector: 'node[group="variable"]',
                        style: { "background-color": "#6c63ff" },
                    },
                    {
                        selector: "edge",
                        style: {
                            width: 2,
                            "line-color": "#a29bfe",
                            "target-arrow-color": "#a29bfe",
                            "target-arrow-shape": "triangle",
                            "curve-style": "bezier",
                            label: "data(label)",
                            color: "#ccc",
                            "font-size": "10px",
                            "font-family": '"JetBrains Mono", monospace',
                            "text-background-color": "#1a1a2e",
                            "text-background-opacity": 1,
                            "text-background-padding": "3px",
                        },
                    },
                ],
            });

            let layout = createLayout();
            let hasFitted = false;

            const fitInitialViewport = () => {
                if (hasFitted) {
                    return;
                }

                hasFitted = true;
                cy.fit(undefined, 50);
                cy.zoom(Math.min(cy.zoom(), 2));
            };

            const runLayout = () => {
                layout = cy.layout(createLayout());
                if (!hasFitted) {
                    layout.one("layoutready", () => {
                        requestAnimationFrame(fitInitialViewport);
                    });
                }
                layout.run();
            };

            runLayout();

            cy.on("grab", "node", () => {
                layout.stop();
            });

            cy.on("free", "node", () => {
                runLayout();
            });
        </script>
    </body>
</html>
