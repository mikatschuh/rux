<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/webcola/WebCola/cola.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/cytoscape-cola/cytoscape-cola.js"></script>
        <style>
            body {
                margin: 0;
            }
            #cy {
                width: 100vw;
                height: 100vh;
                background: #1a1a2e;
            }
        </style>
    </head>
    <body>
        <div id="cy"></div>
        <script>
            /* IMPORTANT: Keep comments as block comments */
            cytoscape.use(cytoscapeCola);
            const MAX_DIM_LEVEL = 4;

            const createLayout = () => ({
                name: "cola",
                animate: true,
                infinite: true,
                fit: false,
                nodeSpacing: 30,
                edgeLength: 50,
                edgeElasticity: 0.04,
                nestingFactor: 0.1,
                gravity: 0.0,
                avoidOverlap: true,
                handleDisconnected: true,
                nodeDimensionsIncludeLabels: true,
                convergenceThreshold: 0.01,
                randomize: false /* keep ELK positions as starting point */,
                refresh: 3,
            });

            const cy = cytoscape({
                userZoomingEnabled: true,
                userPanningEnabled: true,
                wheelSensitivity: 0.2,
                container: document.getElementById("cy"),
                elements: [__ELEMENTS__],
                style: [
                    {
                        selector: "node",
                        style: {
                            label: "data(label)",
                            color: "#fff",
                            "font-family": '"JetBrains Mono", monospace',
                            "font-size": "12px",
                            "text-valign": "center",
                            "text-halign": "center",
                            width: "label",
                            height: "label",
                            padding: "10px",
                            shape: "roundrectangle",
                            "background-color": "#6c63ff",
                        },
                    },
                    {
                        selector: 'node[group="operator"]',
                        style: { "background-color": "#00b894" },
                    },
                    {
                        selector: 'node[group="literal"]',
                        style: { "background-color": "#e17055" },
                    },
                    {
                        selector: 'node[group="variable"]',
                        style: { "background-color": "#6c63ff" },
                    },
                    {
                        selector: 'node[group="memory"]',
                        style: { "background-color": "#085a57" },
                    },
                    {
                        selector: 'node[group="type"]',
                        style: { "background-color": "#6c63ff" },
                    },
                    {
                        selector: "edge",
                        style: {
                            width: 2,
                            "line-color": "#a29bfe",
                            "target-arrow-color": "#a29bfe",
                            "target-arrow-shape": "triangle",
                            "curve-style": "bezier",
                            label: "data(label)",
                            color: "#ccc",
                            "font-size": "10px",
                            "font-family": '"JetBrains Mono", monospace',
                            "text-background-color": "#1a1a2e",
                            "text-background-opacity": 1,
                            "text-background-padding": "3px",
                        },
                    },
                    {
                        selector: 'edge[group="memory"]',
                        style: {
                            "line-color": "#83769c",
                            "target-arrow-color": "#83769c",
                        },
                    },
                    {
                        selector: 'edge[group="type"]',
                        style: {
                            "line-color": "#83769c",
                            "target-arrow-color": "#83769c",
                            opacity: 0.5,
                            "text-opacity": 0.8,
                        },
                    },

                    {
                        selector: ".dimmed-1",
                        style: {
                            opacity: 0.8,
                            "text-opacity": 0.8,
                        },
                    },
                    {
                        selector: ".dimmed-2",
                        style: {
                            opacity: 0.5,
                            "text-opacity": 0.55,
                        },
                    },
                    {
                        selector: ".dimmed-3",
                        style: {
                            opacity: 0.4,
                            "text-opacity": 0.35,
                        },
                    },
                    {
                        selector: ".dimmed-4",
                        style: {
                            opacity: 0.08,
                            "text-opacity": 0.15,
                        },
                    },
                ],
            });

            let layout = createLayout();
            let hasFitted = false;

            const fitInitialViewport = () => {
                if (hasFitted) {
                    return;
                }

                hasFitted = true;
                cy.fit(undefined, 50);
                cy.zoom(Math.min(cy.zoom(), 2));
            };

            const runLayout = () => {
                layout = cy.layout(createLayout());
                if (!hasFitted) {
                    layout.one("layoutready", () => {
                        requestAnimationFrame(fitInitialViewport);
                    });
                }
                layout.run();
            };

            const dimClasses = Array.from(
                { length: MAX_DIM_LEVEL },
                (_, index) => `dimmed-${index + 1}`,
            );

            const clearDimming = () => {
                cy.elements().removeClass(dimClasses.join(" "));
            };

            const setDimLevel = (elements, level) => {
                elements.removeClass(dimClasses.join(" "));
                elements.addClass(`dimmed-${Math.min(level, MAX_DIM_LEVEL)}`);
            };

            const applyConnectivityDimming = (root) => {
                clearDimming();
                cy.elements().addClass(`dimmed-${MAX_DIM_LEVEL}`);

                root.removeClass(dimClasses.join(" "));
                const incomingEdges = root.incomers("edge");
                const incomingSources = incomingEdges.sources();

                const queue = [{ node: root, level: 0 }];
                const seen = new Set([root.id()]);

                while (queue.length > 0) {
                    const { node, level } = queue.shift();
                    const nextLevel = level + 1;

                    node.outgoers("edge").forEach((edge) => {
                        setDimLevel(edge, nextLevel);

                        const target = edge.target();
                        if (seen.has(target.id())) {
                            return;
                        }

                        seen.add(target.id());
                        setDimLevel(target, nextLevel);
                        queue.push({
                            node: target,
                            level: Math.min(nextLevel, MAX_DIM_LEVEL),
                        });
                    });
                }

                setDimLevel(incomingEdges, 3);
                setDimLevel(incomingSources, 3);
                root.removeClass(dimClasses.join(" "));
            };

            runLayout();

            cy.on("grab", "node", (e) => {
                layout.stop();
                applyConnectivityDimming(e.target);
            });

            cy.on("free", "node", () => {
                clearDimming();
                runLayout();
            });
        </script>
    </body>
</html>
